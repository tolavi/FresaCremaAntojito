<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRESA CON CREMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/carrito.css">
    <!-- En el head de carrito.html, añade: -->
    <link rel="stylesheet" href="assets/css/pagos.css">
    <script src="assets/js/auth.js" defer></script>
    <script src="assets/js/mobile-menu.js" defer></script>
    <script src="assets/js/carrito.js" defer></script>
    <script>
        // Verificar autenticación al cargar
        document.addEventListener('DOMContentLoaded', function () {
            if (!window.auth.initializeProtectedPage()) return;

            // Mostrar nombre de usuario en el header
            const user = window.auth.getCurrentUser();
            const userSpan = document.querySelector('.user-profile span');
            if (user && userSpan) {
                userSpan.textContent = user.nombre || 'Administrador';
            }
        });
    </script>
</head>

<body class="bg-gray-100">
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <button id="hamburgerBtn" class="hamburger-btn" style="display: none;">
                    ☰
                </button>
                <div class="logo-section">
                    <div class="logo-icon">🍓</div>
                    <div class="logo-text">
                        <h1>FRESA CON CREMA</h1>
                        <p>Tu Antojito</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="header-actions">
            <button class="icon-btn">🔔<span class="badge">3</span></button>
            <button class="icon-btn" onclick="window.location.href='carrito.html'">
                🛒
                <span class="badge" id="cartBadge" style="display: none;">0</span>
            </button>
            <div class="user-profile">
                <img src="assets/imagen/Photocon.png" alt="Usuario"
                    onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22%3E%3Ccircle cx=%2220%22 cy=%2220%22 r=%2220%22 fill=%22%23ec4899%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22white%22 font-size=%2216%22 font-weight=%22bold%22%3EA%3C/text%3E%3C/svg%3E'">
                <span id="userName">Administrador</span>
            </div>
        </div>
    </header>

    <div class="flex">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <nav class="mt-8">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>Dashboard</span>
                </a>

                <a href="productos.html" class="nav-item">
                    <span class="nav-icon">🍓</span>
                    <span>Productos</span>
                </a>

                <a href="carrito.html" class="nav-item active">
                    <span class="nav-icon">🛒</span>
                    <span>Carrito</span>
                    <span class="cart-badge-mobile" id="cartBadgeMobile" style="display: none;">0</span>
                </a>

                <a href="analiticas.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Analíticas</span>
                </a>

                <a href="usuarios.html" class="nav-item">
                    <span class="nav-icon">👥</span>
                    <span>Usuarios</span>
                </a>

                <a href="orders.html" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span>Pedidos</span>
                </a>
                <a href="configuracion.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>Configuracion</span>
                </a>
            </nav>
        </aside>

        <!-- Overlay para móvil -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container" style="max-width: 3000px; margin: 0 auto;">
                <h2 class="page-title">Tu Carrito 🛒</h2>
                <div id="cartContent">
                    <!-- El carrito se cargará aquí -->
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-icon">🍓</div>
                <p class="footer-title">FRESA CON CREMA - Tu Antojito</p>
                <p class="footer-text">Delicias frescas todos los días</p>
            </div>
        </div>
    </footer>

    <script>
        // Actualizar nombre de usuario al cargar
        document.addEventListener('DOMContentLoaded', function () {
            const userData = localStorage.getItem('fresa_user');
            if (userData) {
                try {
                    const user = JSON.parse(userData);
                    const userNameElement = document.getElementById('userName');
                    if (userNameElement && user.nombre) {
                        userNameElement.textContent = user.nombre;
                    }
                } catch (error) {
                    console.error('Error parsing user data:', error);
                }
            }
        });
    </script>
</body>

</html>
